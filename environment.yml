name: improver-nw-russia
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  # IMPROVER & Iris ecosystem
  - improver
  - iris>=3.10
  - iris-grib
  # Data access & formats
  - xarray>=2024.10
  - dask>=2024.1
  - zarr>=2.18
  - netcdf4
  - h5netcdf
  - cfgrib
  - eccodes
  - gcsfs
  - s3fs
  - fsspec
  # ECMWF tools
  - ecmwf-opendata
  # Scientific computing
  - numpy>=1.26
  - scipy>=1.12
  - pandas>=2.2
  - scikit-learn
  # Verification
  - properscoring
  - xskillscore
  # Visualisation
  - matplotlib>=3.8
  - cartopy>=0.22
  - seaborn
  # Development
  - jupyter
  - jupyterlab
  - ipywidgets
  # Testing
  - pytest
  - pytest-cov
  # Utilities
  - pyyaml
  - click
  - tqdm
  - loguru
  - pip
  - pip:
      - herbie-data
